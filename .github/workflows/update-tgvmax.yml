name: Update TGVmax Data

permissions:
  contents: write

on:
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:

jobs:
  update-tgvmax:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Récupération du code ──────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Configuration Node.js ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      # ── 3. Téléchargement de stations.csv (pour les coordonnées GPS) ─────────
      - name: Download stations.csv
        run: |
          curl -fsSL "https://raw.githubusercontent.com/trainline-eu/stations/master/stations.csv" -o stations.csv
          echo "✅ stations.csv prêt"

      # ── 4. Ingestion + construction de l'index des gares ─────────────────────
      # npm run build exécute l'ingestion brute et crée l'index numérique
      - name: Run Build (ingest + stations index)
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      # ── 5. Vérification des fichiers critiques ────────────────────────────────
      - name: Verify outputs
        run: |
          echo "=== Contenu de engine_data/ ==="
          ls -lh engine_data/
          for f in trips.json stops.json calendar_index.json meta.json; do
            if [ ! -f "engine_data/$f" ]; then
              echo "❌ Fichier critique manquant : engine_data/$f"
              exit 1
            fi
          done
          if [ ! -f "stations.json" ]; then
            echo "❌ stations.json manquant à la racine"
            exit 1
          fi
          echo "✅ Tous les fichiers numériques et l'index sont présents"

     # ── 6. Push des modifications directement sur la branche ──────────────────
      - name: Commit and Push to main branch
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # On utilise -f pour passer outre le .gitignore de l'environnement de build
          git add -f engine_data/ stations.json
          
          # On vérifie s'il y a des changements à commiter
          if git diff --quiet --staged; then
            echo "ℹ️ Aucun nouveau train TGVmax aujourd'hui. Dépôt déjà à jour."
          else
            git commit -m "🤖 Auto-update TGVmax data & stations index ($(date -u +'%Y-%m-%d'))"
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ Données poussées avec succès sur la branche."
          fi