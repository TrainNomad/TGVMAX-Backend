name: Update TGVmax Data (Binary Format)

permissions:
  contents: write

on:
  schedule:
    - cron: '30 7 * * *'  # 07:30 UTC chaque jour
  workflow_dispatch:

jobs:
  update-tgvmax:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Récupération du code ──────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Configuration Node.js ─────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm install
          fi

      # ── 3. Téléchargement de stations.csv ────────────────────────────────────
      - name: Download stations.csv
        run: |
          curl -fsSL "https://raw.githubusercontent.com/trainline-eu/stations/master/stations.csv" -o stations.csv
          echo "✅ stations.csv prêt"

      # ── 4. Ingestion TGVMAX + Encodage binaire ──────────────────────────────
      - name: Run Build (ingest + binary encoding + stations index)
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      # ── 5. Vérification des fichiers critiques ──────────────────────────────
      - name: Verify outputs
        run: |
          echo "=== Contenu de engine_data/ ==="
          ls -lh engine_data/
          
          # Fichiers requis
          for f in trips.bin trip_meta.json; do
            if [ ! -f "engine_data/$f" ]; then
              echo "❌ Fichier critique manquant : engine_data/$f"
              exit 1
            fi
          done
          
          if [ ! -f "stations.json" ]; then
            echo "❌ stations.json manquant à la racine"
            exit 1
          fi
          
          echo ""
          echo "✅ Tous les fichiers numériques sont présents :"
          echo "   • engine_data/trips.bin"
          echo "   • engine_data/trip_meta.json"
          echo "   • stations.json"

      # ── 6. Push des modifications sur la branche ────────────────────────────
      - name: Commit and Push to main branch
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Ajouter les fichiers binaires malgré .gitignore
          git add -f engine_data/trips.bin engine_data/trip_meta.json stations.json
          
          # Vérifier s'il y a des changements
          if git diff --quiet --staged; then
            echo "ℹ️ Aucun nouveau trajet TGVmax aujourd'hui. Dépôt déjà à jour."
          else
            git commit -m "🤖 Auto-update TGVmax data (binary format) - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ Données poussées avec succès sur la branche."
          fi